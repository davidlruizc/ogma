<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ogma</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body data-theme="dark">
    <div class="titlebar">
      <span class="titlebar-label">OGMA — MEETING RECORDER</span>
      <span class="flex-spacer"></span>
      <button id="theme-toggle" class="theme-toggle" title="Toggle theme">◑ DARK</button>
    </div>

    <div class="shell">
      <aside class="sidebar">
        <div class="brand">ogma<span class="brand-dot">.</span></div>

        <nav class="nav" id="nav">
          <button class="nav-item" data-nav="record">
            <span class="nav-label">Record</span>
            <span class="flex-spacer"></span>
            <span class="nav-badge" data-badge="record"></span>
          </button>
          <button class="nav-item" data-nav="library">
            <span class="nav-label">Library</span>
            <span class="flex-spacer"></span>
            <span class="nav-badge" data-badge="library"></span>
          </button>
          <button class="nav-item" data-nav="settings">
            <span class="nav-label">Settings</span>
            <span class="flex-spacer"></span>
            <span class="nav-badge" data-badge="settings"></span>
          </button>
        </nav>

        <span class="flex-spacer"></span>

        <div class="sidebar-status">
          <div class="status-line">
            <span class="status-dot ok"></span>MCP server · stdio
          </div>
          <div class="status-line" id="notion-status">
            <span class="status-dot muted"></span>Notion · not connected
          </div>
        </div>
      </aside>

      <main id="app"></main>
    </div>

    <div id="toasts" aria-live="polite"></div>
  </body>
</html>
