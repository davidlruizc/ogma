name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Ogma v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            ## Downloads

            - **Windows**: `.msi` (recommended) or `-setup.exe`
            - **macOS (Apple Silicon)**: `.dmg` — **experimental**, not yet tested on real hardware

            ## Installing unsigned builds

            These builds are not code-signed.

            - **Windows**: if SmartScreen shows "Windows protected your PC", click **More info → Run anyway**.
            - **macOS**: the download is quarantined. Right-click the app and choose **Open**, or run:
              ```
              xattr -cr /Applications/Ogma.app
              ```
