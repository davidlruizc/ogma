name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: "aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OTA updater artifact signing (minisign). The public key lives in
          # tauri.conf.json; losing this private key means shipped apps can
          # never accept another update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Ogma v__VERSION__"
          releaseDraft: true
          prerelease: false
          # latest.json points Windows updates at the NSIS installer: Tauri's
          # NSIS installer replaces an existing MSI install cleanly, but an MSI
          # update over an NSIS install would leave two copies behind.
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
          releaseBody: |
            ## Downloads

            - **Windows**: `-setup.exe` (recommended) or `.msi`
            - **macOS (Apple Silicon)**: `.dmg` — **experimental**, not yet tested on real hardware

            Installed copies check for updates on launch and can update themselves
            from Settings → Updates (over-the-air, signed).

            ## Installing unsigned builds

            These builds are not code-signed.

            - **Windows**: if SmartScreen shows "Windows protected your PC", click **More info → Run anyway**.
            - **macOS**: the download is quarantined. Right-click the app and choose **Open**, or run:
              ```
              xattr -cr /Applications/Ogma.app
              ```
